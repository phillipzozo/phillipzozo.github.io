<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAX7219 顏文字點矩陣產生器</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel 讓瀏覽器可以解析 JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { background-color: #0a0a0a; color: #e5e5e5; }
    /* 自訂卷軸樣式 */
    ::-webkit-scrollbar { height: 8px; }
    ::-webkit-scrollbar-track { background: #171717; border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #52525b; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // SVG 圖示元件 (取代原本的 lucide-react)
    const IconSettings = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 7h-9"/><path d="M14 17H5"/><circle cx="17" cy="7" r="3"/><circle cx="7" cy="17" r="3"/></svg>;
    const IconType = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" x2="15" y1="20" y2="20"/><line x1="12" x2="12" y1="4" y2="20"/></svg>;
    const IconMinus = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" x2="19" y1="12" y2="12"/></svg>;
    const IconPlus = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/></svg>;
    const IconDownload = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>;
    const IconMousePointer = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4.037 4.688a.495.495 0 0 1 .651-.651l16 6.5a.5.5 0 0 1-.063.947l-6.124 1.58a2 2 0 0 0-1.438 1.435l-1.579 6.126a.5.5 0 0 1-.947.063z"/></svg>;
    const IconTrash = () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>;
    const IconCopy = () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>;

    function App() {
      const [matrixCount, setMatrixCount] = useState(4);
      const [grid, setGrid] = useState([]);
      
      const [inputText, setInputText] = useState('(・ω・)ノ');
      const [fontSize, setFontSize] = useState(8);
      const [offsetX, setOffsetX] = useState(0);
      const [offsetY, setOffsetY] = useState(0);
      
      const [isDrawing, setIsDrawing] = useState(false);
      const [drawMode, setDrawMode] = useState(true);

      const [activeTab, setActiveTab] = useState('arduino');
      const [copyStatus, setCopyStatus] = useState('');

      useEffect(() => {
        const newGrid = Array(8).fill(null).map(() => Array(matrixCount * 8).fill(false));
        for (let r = 0; r < 8; r++) {
          for (let c = 0; c < Math.min(grid[r]?.length || 0, matrixCount * 8); c++) {
            newGrid[r][c] = grid[r][c];
          }
        }
        setGrid(newGrid);
      }, [matrixCount]);

      const renderTextToGrid = () => {
        const canvas = document.createElement('canvas');
        const width = matrixCount * 8;
        const height = 8;
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');

        ctx.fillStyle = 'black';
        ctx.fillRect(0, 0, width, height);

        ctx.fillStyle = 'white';
        ctx.font = `${fontSize}px "Microsoft JhengHei", "PingFang TC", monospace`;
        ctx.textBaseline = 'middle';
        ctx.textAlign = 'center';
        
        const centerX = width / 2 + offsetX;
        const centerY = height / 2 + offsetY;
        
        ctx.fillText(inputText, centerX, centerY);

        const imageData = ctx.getImageData(0, 0, width, height).data;
        
        const newGrid = Array(8).fill(null).map(() => Array(width).fill(false));
        
        for (let r = 0; r < height; r++) {
          for (let c = 0; c < width; c++) {
            const index = (r * width + c) * 4;
            const rValue = imageData[index];
            const gValue = imageData[index + 1];
            const bValue = imageData[index + 2];
            const brightness = (rValue + gValue + bValue) / 3;
            newGrid[r][c] = brightness > 128;
          }
        }
        setGrid(newGrid);
      };

      const clearGrid = () => {
        setGrid(Array(8).fill(null).map(() => Array(matrixCount * 8).fill(false)));
      };

      const handleMouseDown = (r, c) => {
        setIsDrawing(true);
        const newMode = !grid[r][c];
        setDrawMode(newMode);
        updateGridPixel(r, c, newMode);
      };

      const handleMouseEnter = (r, c) => {
        if (isDrawing) {
          updateGridPixel(r, c, drawMode);
        }
      };

      const handleMouseUp = () => {
        setIsDrawing(false);
      };

      const updateGridPixel = (r, c, value) => {
        setGrid(prev => {
          const newGrid = [...prev];
          newGrid[r] = [...newGrid[r]];
          newGrid[r][c] = value;
          return newGrid;
        });
      };

      useEffect(() => {
        window.addEventListener('mouseup', handleMouseUp);
        return () => window.removeEventListener('mouseup', handleMouseUp);
      }, []);

      const generateHexData = () => {
        const matricesHex = [];
        for (let m = 0; m < matrixCount; m++) {
          const matrixBytes = [];
          for (let r = 0; r < 8; r++) {
            let byteVal = 0;
            for (let c = 0; c < 8; c++) {
              if (grid[r] && grid[r][m * 8 + c]) {
                byteVal |= (1 << (7 - c));
              }
            }
            matrixBytes.push(`0x${byteVal.toString(16).padStart(2, '0').toUpperCase()}`);
          }
          matricesHex.push(matrixBytes);
        }
        return matricesHex;
      };

      const generateArduinoCode = () => {
        const hexData = generateHexData();
        let code = `// 適用於 LedControl 等 MAX7219 函式庫的字節陣列\n`;
        code += `#define NUM_MATRICES ${matrixCount}\n\n`;
        code += `byte customImage[NUM_MATRICES][8] = {\n`;
        hexData.forEach((matrix, index) => {
          code += `  { ${matrix.join(', ')} }${index < hexData.length - 1 ? ',' : ''} // Matrix ${index}\n`;
        });
        code += `};`;
        return code;
      };

      const generatePythonCode = () => {
        const hexData = generateHexData();
        let code = `# 適用於 luma.led_matrix 或 MicroPython MAX7219 模組\n`;
        code += `NUM_MATRICES = ${matrixCount}\n\n`;
        code += `custom_image = [\n`;
        hexData.forEach((matrix, index) => {
          code += `    [${matrix.join(', ')}], # Matrix ${index}\n`;
        });
        code += `]`;
        return code;
      };

      const copyToClipboard = () => {
        const textToCopy = activeTab === 'arduino' ? generateArduinoCode() : generatePythonCode();
        
        // 使用傳統的 document.execCommand('copy') 來避免 iframe 中的 Permissions-Policy 限制
        const textArea = document.createElement("textarea");
        textArea.value = textToCopy;
        textArea.style.position = "fixed";
        textArea.style.left = "-999999px";
        textArea.style.top = "-999999px";
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();
        
        try {
          document.execCommand('copy');
          setCopyStatus('已複製!');
        } catch (error) {
          setCopyStatus('複製失敗');
          console.error('複製到剪貼簿時發生錯誤:', error);
        }
        
        setTimeout(() => setCopyStatus(''), 2000);
        textArea.remove();
      };

      return (
        <div className="min-h-screen bg-neutral-950 text-neutral-200 p-4 md:p-8 font-sans selection:bg-red-500/30">
          <div className="max-w-5xl mx-auto space-y-6">
            
            {/* Header */}
            <header className="flex flex-col md:flex-row md:items-center justify-between border-b border-neutral-800 pb-4 gap-4">
              <div className="flex items-center gap-3">
                <div className="p-2 bg-red-500/10 rounded-lg text-red-500">
                  <IconSettings />
                </div>
                <div>
                  <h1 className="text-2xl font-bold text-white">MAX7219 顏文字點矩陣產生器</h1>
                  <p className="text-sm text-neutral-400">將顏文字轉為 8x8 LED 陣列資料</p>
                </div>
              </div>
            </header>

            {/* Control Panel */}
            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
              
              <div className="lg:col-span-1 space-y-4 bg-neutral-900 border border-neutral-800 p-5 rounded-xl">
                <h2 className="text-lg font-semibold text-white flex items-center gap-2">
                  <IconType /> 文字設定
                </h2>
                
                <div className="space-y-3">
                  <div>
                    <label className="block text-xs font-medium text-neutral-400 mb-1">模組數量 (8x8)</label>
                    <div className="flex items-center bg-neutral-950 rounded-lg border border-neutral-800 p-1">
                      <button onClick={() => setMatrixCount(Math.max(1, matrixCount - 1))} className="p-2 hover:bg-neutral-800 rounded-md transition-colors">
                        <IconMinus />
                      </button>
                      <span className="flex-1 text-center font-mono text-white">{matrixCount}</span>
                      <button onClick={() => setMatrixCount(Math.min(16, matrixCount + 1))} className="p-2 hover:bg-neutral-800 rounded-md transition-colors">
                        <IconPlus />
                      </button>
                    </div>
                  </div>

                  <div>
                    <label className="block text-xs font-medium text-neutral-400 mb-1">顏文字輸入</label>
                    <input 
                      type="text" 
                      value={inputText}
                      onChange={(e) => setInputText(e.target.value)}
                      className="w-full bg-neutral-950 border border-neutral-800 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-red-500 transition-colors"
                      placeholder="輸入文字..."
                    />
                  </div>

                  <div className="grid grid-cols-3 gap-2">
                    <div>
                      <label className="block text-xs font-medium text-neutral-400 mb-1">字體大小</label>
                      <input type="number" value={fontSize} onChange={(e) => setFontSize(Number(e.target.value))} className="w-full bg-neutral-950 border border-neutral-800 rounded-lg px-2 py-1.5 text-center text-sm" />
                    </div>
                    <div>
                      <label className="block text-xs font-medium text-neutral-400 mb-1">X 偏移</label>
                      <input type="number" value={offsetX} onChange={(e) => setOffsetX(Number(e.target.value))} className="w-full bg-neutral-950 border border-neutral-800 rounded-lg px-2 py-1.5 text-center text-sm" />
                    </div>
                    <div>
                      <label className="block text-xs font-medium text-neutral-400 mb-1">Y 偏移</label>
                      <input type="number" value={offsetY} onChange={(e) => setOffsetY(Number(e.target.value))} className="w-full bg-neutral-950 border border-neutral-800 rounded-lg px-2 py-1.5 text-center text-sm" />
                    </div>
                  </div>

                  <button 
                    onClick={renderTextToGrid}
                    className="w-full mt-2 bg-red-600 hover:bg-red-500 text-white font-medium py-2 rounded-lg transition-colors flex items-center justify-center gap-2"
                  >
                    <IconDownload /> 轉換至點矩陣
                  </button>
                </div>
              </div>

              {/* Matrix Preview */}
              <div className="lg:col-span-2 space-y-4 bg-neutral-900 border border-neutral-800 p-5 rounded-xl flex flex-col min-w-0">
                <div className="flex items-center justify-between">
                  <h2 className="text-lg font-semibold text-white flex items-center gap-2">
                    <IconMousePointer /> 預覽與手繪區
                  </h2>
                  <button onClick={clearGrid} className="text-xs flex items-center gap-1 text-neutral-400 hover:text-red-400 transition-colors px-2 py-1 bg-neutral-800 rounded-md">
                    <IconTrash /> 清空網格
                  </button>
                </div>
                
                <div className="flex-1 flex items-center overflow-x-auto bg-neutral-950 rounded-lg border border-neutral-800 p-4 min-h-[160px]">
                  <div className="flex gap-2 mx-auto">
                    {Array.from({ length: matrixCount }).map((_, mIndex) => (
                      <div key={mIndex} className="bg-[#0a0a0a] p-1 rounded border border-neutral-800 shadow-inner grid grid-rows-8 gap-[1px]">
                        {Array.from({ length: 8 }).map((_, r) => (
                          <div key={r} className="flex gap-[1px]">
                            {Array.from({ length: 8 }).map((_, c) => {
                              const colIndex = mIndex * 8 + c;
                              const isLit = grid[r] && grid[r][colIndex];
                              return (
                                <div
                                  key={c}
                                  onMouseDown={(e) => { e.preventDefault(); handleMouseDown(r, colIndex); }}
                                  onMouseEnter={() => handleMouseEnter(r, colIndex)}
                                  className={`w-4 h-4 md:w-5 md:h-5 rounded-full cursor-pointer transition-colors duration-75 select-none ${
                                    isLit ? 'bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.8)]' : 'bg-neutral-800'
                                  }`}
                                  style={{ 
                                    margin: '1px',
                                    boxSizing: 'border-box', 
                                    border: isLit ? '1px solid #fca5a5' : '1px solid #262626'
                                  }}
                                />
                              );
                            })}
                          </div>
                        ))}
                      </div>
                    ))}
                  </div>
                </div>
                <p className="text-xs text-neutral-500 text-center">提示：可以在網格上點擊或拖曳來自由手繪/擦除 LED。</p>
              </div>
            </div>

            {/* Code Output */}
            <div className="bg-neutral-900 border border-neutral-800 rounded-xl overflow-hidden">
              <div className="flex items-center justify-between px-4 border-b border-neutral-800 bg-neutral-950/50">
                <div className="flex">
                  <button 
                    className={`px-4 py-3 text-sm font-medium border-b-2 transition-colors ${activeTab === 'arduino' ? 'border-red-500 text-red-400' : 'border-transparent text-neutral-400 hover:text-neutral-200'}`}
                    onClick={() => setActiveTab('arduino')}
                  >
                    Arduino (C/C++)
                  </button>
                  <button 
                    className={`px-4 py-3 text-sm font-medium border-b-2 transition-colors ${activeTab === 'python' ? 'border-blue-500 text-blue-400' : 'border-transparent text-neutral-400 hover:text-neutral-200'}`}
                    onClick={() => setActiveTab('python')}
                  >
                    Python
                  </button>
                </div>
                <button 
                  onClick={copyToClipboard}
                  className="flex items-center gap-1.5 text-xs bg-neutral-800 hover:bg-neutral-700 text-neutral-200 py-1.5 px-3 rounded-md transition-colors"
                >
                  {copyStatus ? <span className="text-green-400">{copyStatus}</span> : <><IconCopy /> 複製程式碼</>}
                </button>
              </div>
              
              <div className="p-4 bg-[#0d0d0d] overflow-x-auto">
                <pre className="text-sm font-mono text-neutral-300 leading-relaxed">
                  <code>
                    {activeTab === 'arduino' ? generateArduinoCode() : generatePythonCode()}
                  </code>
                </pre>
              </div>
            </div>

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
